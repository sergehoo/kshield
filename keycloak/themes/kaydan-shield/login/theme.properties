# KAYDAN SHIELD — Theme login Keycloak
# Hérite du theme keycloak.v2 (Keycloak 26.x utilise nativement v2 pour le login)

parent=keycloak.v2
import=common/keycloak

# Locales activées (FR par défaut, EN secours)
locales=fr,en

# Styles : on ajoute notre fichier CSS custom au-dessus du theme parent
styles=css/login.css css/kaydan.css

# Scripts
scripts=

# Pages réutilisables sans modification (héritées du parent)
# - login.ftl                  # surchargée
# - login-update-password.ftl  # héritée
# - login-otp.ftl              # héritée
# - error.ftl                  # surchargée
# - login-reset-password.ftl   # héritée
# - login-page-expired.ftl     # héritée

# Métadonnées du theme
kcLogoLink=https://shield.kaydangroupe.com
kcLogoIdP-keycloak-oidc=fa fa-cube
