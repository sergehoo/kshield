# Kaydan Shield — Mosquitto config PRODUCTION (TLS + auth).
#
# Utilisation :
#   1. Générer les certificats (voir README-mosquitto.md)
#   2. Créer le password_file : mosquitto_passwd -c passwd kshield_server
#   3. Ajouter les autres users : mosquitto_passwd -b passwd kshield_agent1 <mdp>
#   4. Monter ces fichiers en volume read-only dans le container
#   5. Lancer avec MOSQUITTO_CONF=/mosquitto/config/mosquitto.prod.conf

# ═══ Listener MQTT clair — désactivé en prod, ou binding localhost only ═══
# Décommenter si des équipements legacy ne supportent pas TLS
# listener 1883 127.0.0.1

# ═══ Listener MQTT/TLS (port 8883, standard) ═══
listener 8883 0.0.0.0
protocol mqtt

# Certificats serveur (émis par ta CA interne ou Let's Encrypt)
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

# TLS version min (rejette SSLv3/TLS 1.0/1.1)
tls_version tlsv1.2

# require_certificate true → mTLS (chaque client doit présenter un cert signé par la CA)
# Recommandé pour les Agent locaux + terminaux critiques
require_certificate false

# ═══ Auth par login/mdp ═══
password_file /mosquitto/config/passwd
allow_anonymous false

# ═══ ACL — cloisonnement par topic ═══
# (créer un fichier /mosquitto/config/acl et le référencer ci-dessous)
# acl_file /mosquitto/config/acl

# ═══ Persistance + logs ═══
persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# ═══ Limitations ═══
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 65536
