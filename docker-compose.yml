# ==============================================================================
# KAYDAN SHIELD — Docker Compose
# ==============================================================================
# Tous les noms de services sont préfixés `shield` pour éviter les collisions
# avec d'autres stacks sur le même hôte (ex. `web`, `db`, `redis` génériques).
#
# Prérequis serveur :
#   - Traefik v2/v3 déjà installé sur l'hôte, exposé en 80/443
#     (NE PAS redéployer Traefik ici — on s'y raccroche via le réseau externe)
#   - Réseau Docker externe configurable via PROXY_NETWORK (default = dokploy-network)
#       docker network create proxy           (standalone Traefik)
#       ou Dokploy crée automatiquement dokploy-network
#   - Certresolver Let's Encrypt nommé via CERT_RESOLVER (default = lets)
#   - DNS A/AAAA pointant vers le serveur pour BASE_DOMAIN (ex. kaydanshield.com) :
#       <BASE_DOMAIN>                          (front + redirect www)
#       api.<BASE_DOMAIN>                      (API Django + admin)
#       ws.<BASE_DOMAIN>                       (WebSockets Channels)
#       minio.<BASE_DOMAIN>                    (MinIO API S3)
#       minio-console.<BASE_DOMAIN>            (console MinIO)
#       adminer.<BASE_DOMAIN>                  (admin DB, protégé basic auth)
#
# Lancement :
#   docker compose --env-file .env up -d --build
# ==============================================================================

name: kshield

networks:
  kshield_network:
    name: kshield_network
    driver: bridge
  # Réseau du reverse proxy externe. Sur Dokploy il s'appelle `dokploy-network`;
  # sur un Traefik standalone il s'appelle généralement `proxy`. On définit
  # ici un alias local `proxy` qui pointe vers le bon réseau externe via la
  # variable d'env `PROXY_NETWORK` (default = "dokploy-network").
  proxy:
    external: true
    name: ${PROXY_NETWORK:-dokploy-network}

# Volumes préfixés `kshield_` pour éviter toute collision avec d'autres stacks.
volumes:
  kshield_pgdata:
    name: kshield_pgdata
  kshield_redis_data:
    name: kshield_redis_data
  kshield_minio_data:
    name: kshield_minio_data
  kshield_mqtt_data:
    name: kshield_mqtt_data
  kshield_mqtt_log:
    name: kshield_mqtt_log
  kshield_static:
    name: kshield_static
  kshield_media:
    name: kshield_media
  kshield_logs:
    name: kshield_logs
  kshield_backups:
    name: kshield_backups

x-logging-rotated: &logging_rotated
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-django-base: &django-base
  build:
    context: .
    dockerfile: Dockerfile
  image: kshield/backend:${VERSION:-latest}
  env_file: [.env]
  environment:
    TZ: Africa/Abidjan
    DJANGO_SETTINGS_MODULE: kshield.settings.prod
    PYTHONUNBUFFERED: "1"
    FORWARDED_ALLOW_IPS: "*"
  restart: unless-stopped
  logging: *logging_rotated

services:

  # ===========================================================================
  # PostgreSQL + PostGIS — non exposé publiquement
  # ===========================================================================
  shielddb:
    image: postgis/postgis:16-3.4
    container_name: kshield_db
    hostname: shielddb
    restart: unless-stopped
    environment:
      TZ: Africa/Abidjan
      POSTGRES_DB: ${POSTGRES_DB:-kaydan_shield}
      POSTGRES_USER: ${POSTGRES_USER:-kshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kshield_pgdata:/var/lib/postgresql/data
    networks: [kshield_network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
    logging: *logging_rotated

  # ===========================================================================
  # Redis (Channels + Celery broker) — non exposé publiquement
  # ===========================================================================
  shieldredis:
    image: redis:7-alpine
    container_name: kshield_redis
    hostname: shieldredis
    restart: unless-stopped
    environment:
      TZ: Africa/Abidjan
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      - kshield_redis_data:/data
    networks: [kshield_network]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 ping | grep PONG >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
    logging: *logging_rotated

  # ===========================================================================
  # EMQX — broker MQTT enterprise (Vague 7)
  #   - MQTT 3.1.1 + 5.0 + WebSocket + QUIC
  #   - Cluster natif (autodécouverte via emqx@dns)
  #   - Dashboard UI :18083
  #   - Bridge Prometheus intégré
  #
  # Pour un cluster 3 nœuds en prod : décommenter emqx-node2 / emqx-node3
  # et définir EMQX_CLUSTER__DISCOVERY_STRATEGY=static.
  # ===========================================================================
  shieldmqtt:
    image: emqx/emqx:5.4
    container_name: kshield_mqtt
    hostname: shieldmqtt
    restart: unless-stopped
    environment:
      TZ: Africa/Abidjan
      # Nom de nœud EMQX (unique dans le cluster)
      EMQX_NODE__NAME: emqx@shieldmqtt
      EMQX_NODE__COOKIE: ${EMQX_NODE_COOKIE:-kshield_emqx_cookie_change_me}
      # Auth API dashboard
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}
      # Autorisation par défaut (dev) — en prod passer par le fichier ACL
      EMQX_ALLOW_ANONYMOUS: "false"
      # Discovery statique — passer à "dns" pour un vrai cluster K8s/DNS
      EMQX_CLUSTER__DISCOVERY_STRATEGY: "static"
      EMQX_CLUSTER__STATIC__SEEDS: '["emqx@shieldmqtt"]'
      # Prometheus DÉSACTIVÉ — l'endpoint sera activable plus tard via le
      # Dashboard EMQX (:18083 → Monitoring → Integration) sans variable env.
      # NB : `EMQX_PROMETHEUS__ENABLE: false` évite tout le legacy schema.
      EMQX_PROMETHEUS__ENABLE: "false"
      # ─── SysMon : relève les seuils par défaut (70% → 90%) ────────────
      # Sur VPS multi-containers, la RAM système dépasse fréquemment 70%
      # → spam de warnings "high_system_memory_usage" toutes les minutes.
      # On monte à 90% (RAM system) et 25% (mem d'un process EMQX unique).
      EMQX_SYSMON__OS__SYSMEM_HIGH_WATERMARK: "90%"
      EMQX_SYSMON__OS__PROCMEM_HIGH_WATERMARK: "25%"
      EMQX_SYSMON__OS__MEM_CHECK_INTERVAL: "60s"
      # Désactive les warnings top-N process (bruit inutile en mono-node).
      EMQX_SYSMON__TOP__NUM_ITEMS: "0"
    volumes:
      - kshield_mqtt_data:/opt/emqx/data
      - kshield_mqtt_log:/opt/emqx/log
    ports:
      # Ports MQTT — TCP direct (Traefik dokploy est HTTP-only, on garde
      # l'exposition port publique pour que les devices/agents puissent
      # publier depuis Internet.
      # ─── 1883 (MQTT clair) : accès interne UNIQUEMENT ────────────────
      # Volontairement NON exposé publiquement — les credentials passeraient
      # en clair sur le réseau. Django/agents utilisent 8883 (TLS) en prod.
      # Pour dev local (test avec mosquitto_pub), décommenter :
      # - "1883:1883"
      - "8883:8883"     # MQTT TLS ← à utiliser en prod
      - "8083:8083"     # MQTT/WebSocket (à supprimer en prod, TLS ci-dessous)
      - "8084:8084"     # MQTT/WebSocket TLS
      # Le port 18083 (dashboard) n'est PLUS exposé publiquement :
      # accès uniquement via Traefik → https://mqtt.${BASE_DOMAIN}
    networks:
      - kshield_network
      - dokploy-network
    labels:
      # ─── Traefik : dashboard EMQX derrière mqtt.${BASE_DOMAIN} ────────
      - traefik.enable=true
      - traefik.docker.network=${PROXY_NETWORK:-dokploy-network}
      # Router HTTPS pour le dashboard EMQX
      - traefik.http.routers.kshield-emqx.rule=Host(`mqtt.${BASE_DOMAIN:-kaydanshield.com}`)
      - traefik.http.routers.kshield-emqx.entrypoints=websecure
      - traefik.http.routers.kshield-emqx.tls=true
      - traefik.http.routers.kshield-emqx.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.kshield-emqx.service=kshield-emqx-svc
      # Service pointe sur le port 18083 (dashboard HTTP interne EMQX)
      - traefik.http.services.kshield-emqx-svc.loadbalancer.server.port=18083
      - traefik.http.services.kshield-emqx-svc.loadbalancer.server.scheme=http
      - traefik.http.services.kshield-emqx-svc.loadbalancer.passhostheader=true
      - traefik.http.services.kshield-emqx-svc.loadbalancer.responseforwarding.flushinterval=100ms
      # Sécurité : rate limit sur le login dashboard (anti brute force)
      - traefik.http.middlewares.kshield-emqx-rl.ratelimit.average=30
      - traefik.http.middlewares.kshield-emqx-rl.ratelimit.burst=60
      # Optionnel : IP allowlist — décommenter pour restreindre l'accès admin
      # - traefik.http.middlewares.kshield-emqx-ipwl.ipwhitelist.sourcerange=1.2.3.4/32
      # - traefik.http.routers.kshield-emqx.middlewares=kshield-emqx-ipwl,kshield-emqx-rl
      - traefik.http.routers.kshield-emqx.middlewares=kshield-emqx-rl
    healthcheck:
      # Historique : essayé successivement curl (endpoint /status disparu en v5),
      # /dev/tcp (bash-only, dash cassé), `emqx ctl status` (échoue en boot).
      # Solution robuste : check que le process Erlang beam.smp tourne via /proc.
      # Aucune dépendance à un binaire externe, marche même durant le boot EMQX.
      test:
        - "CMD-SHELL"
        - "grep -l beam.smp /proc/[0-9]*/comm 2>/dev/null | head -1 | grep -q . || exit 1"
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    logging: *logging_rotated


  # ===========================================================================
  # MinIO (S3 compatible) — exposé via Traefik (API + console)
  # ===========================================================================
  shieldminio:
    image: minio/minio:latest
    container_name: kshield_minio
    hostname: shieldminio
    restart: unless-stopped
    environment:
      TZ: Africa/Abidjan
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kaydan_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://minio-console.kaydanshield.com}
    command: server /data --console-address ":9001"
    volumes:
      - kshield_minio_data:/data
    networks: [kshield_network, proxy]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.docker.network=${PROXY_NETWORK:-dokploy-network}

      # API S3 (port 9000)
      - traefik.http.routers.kshield-minio.rule=Host(`minio.${BASE_DOMAIN:-kaydanshield.com}`)
      - traefik.http.routers.kshield-minio.entrypoints=websecure
      - traefik.http.routers.kshield-minio.tls=true
      - traefik.http.routers.kshield-minio.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.kshield-minio.service=kshield-minio-svc
      - traefik.http.services.kshield-minio-svc.loadbalancer.server.port=9000

      # Console (port 9001)
      - traefik.http.routers.kshield-minio-console.rule=Host(`minio-console.${BASE_DOMAIN:-kaydanshield.com}`)
      - traefik.http.routers.kshield-minio-console.entrypoints=websecure
      - traefik.http.routers.kshield-minio-console.tls=true
      - traefik.http.routers.kshield-minio-console.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.kshield-minio-console.service=kshield-minio-console-svc
      - traefik.http.services.kshield-minio-console-svc.loadbalancer.server.port=9001
    logging: *logging_rotated

  # ===========================================================================
  # API Django (HTTP / REST + admin) — gunicorn / uvicorn
  # ===========================================================================
  shieldweb:
    <<: *django-base
    container_name: kshield_web
    hostname: shieldweb
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py makemigrations --check --dry-run --no-input || echo '⚠️  MODÈLES MODIFIÉS SANS MIGRATION' &&
      python manage.py collectstatic --noinput &&
      gunicorn kshield.asgi:application
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-4}
      --worker-connections ${GUNICORN_WORKER_CONNECTIONS:-1000}
      --max-requests ${GUNICORN_MAX_REQUESTS:-1000}
      --max-requests-jitter 100
      --timeout ${GUNICORN_TIMEOUT:-60}
      --graceful-timeout 30
      --keep-alive 5
      --worker-tmp-dir /dev/shm
      --forwarded-allow-ips='*'
      --access-logfile - --error-logfile -
      --log-level info
      "
    volumes:
      - kshield_static:/app/staticfiles:rw
      - kshield_media:/app/media:rw
      - kshield_logs:/app/logs:rw
    depends_on:
      shielddb:
        condition: service_healthy
      shieldredis:
        condition: service_healthy
    networks: [kshield_network, proxy]
    # Healthcheck via /healthz — endpoint public dédié, pas de spam de logs.
    # 200 si Django répond ; ne touche pas à la DB pour rester rapide.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.docker.network=${PROXY_NETWORK:-dokploy-network}

      # Routing par path : Django reçoit uniquement l'API + admin + assets
      # techniques ; tout le reste (SPA React) tombe sur shieldfront (règle
      # catch-all Host sans PathPrefix, priorité plus basse).
      - traefik.http.routers.kshield-api.rule=Host(`${BASE_DOMAIN:-kaydanshield.com}`) && (PathPrefix(`/api/`) || PathPrefix(`/django-admin/`) || PathPrefix(`/static/`) || PathPrefix(`/media/`) || PathPrefix(`/metrics`) || Path(`/healthz`) || Path(`/readyz`) || PathPrefix(`/iclock/`) || PathPrefix(`/pub/api`) || PathPrefix(`/sso/`) || PathPrefix(`/badges/`))
      - traefik.http.routers.kshield-api.priority=100
      - traefik.http.routers.kshield-api.entrypoints=websecure
      - traefik.http.routers.kshield-api.tls=true
      - traefik.http.routers.kshield-api.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.kshield-api.service=kshield-api-svc

      - traefik.http.services.kshield-api-svc.loadbalancer.server.port=8000
      - traefik.http.services.kshield-api-svc.loadbalancer.server.scheme=http

      # Rate limit API (uploads visiteurs, webhooks reconnaissance faciale)
      # Défini + attaché sur le MÊME container — évite les races cross-container.
      - traefik.http.middlewares.kshield-api-rl.ratelimit.average=300
      - traefik.http.middlewares.kshield-api-rl.ratelimit.burst=500
      - traefik.http.routers.kshield-api.middlewares=kshield-api-rl

      # Flush réponses fréquent — utile pour streaming ADMS
      - traefik.http.services.kshield-api-svc.loadbalancer.responseforwarding.flushinterval=100ms

      # NOTE : sec-headers, compression et timeouts custom retirés — les défauts
      # Traefik suffisent et évitent les races de résolution cross-container qui
      # causaient des Gateway Timeout au boot.
      # Compression : WhiteNoise + gzip nginx font déjà le job.
      # Sec-headers : Django SecurityMiddleware.
      # Timeouts : Traefik défaut 30s dial + gunicorn --timeout=60s suffisent.

  # ===========================================================================
  # Front React (Vite build) — nginx SPA
  # ===========================================================================
  # Sert dist/ (index.html + assets hashés). Traefik le route en catch-all du
  # domaine principal ; tous les paths API/WS/admin sont attrapés par shieldweb
  # AVANT (priority=100). Ce service = priority par défaut (0).
  shieldfront:
    build:
      context: ./kshield-front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${BASE_DOMAIN:-kaydanshield.com}
    image: kshield/frontend:${VERSION:-latest}
    container_name: kshield_front
    hostname: shieldfront
    restart: unless-stopped
    networks: [kshield_network, proxy]
    # NB : le healthcheck vient du Dockerfile (netstat sur port 80).
    # Pas d'override ici — sinon on écraserait le fix ultra-robuste.
    labels:
      - traefik.enable=true
      # IMPORTANT : nom RÉEL du network, pas l'alias local du compose.
      # Sur Dokploy c'est ``dokploy-network`` par défaut ; override via PROXY_NETWORK.
      - traefik.docker.network=${PROXY_NETWORK:-dokploy-network}
      # Catch-all du domaine : tout ce que shieldweb ne prend pas atterrit ici
      - traefik.http.routers.kshield-front.rule=Host(`${BASE_DOMAIN:-kaydanshield.com}`)
      - traefik.http.routers.kshield-front.entrypoints=websecure
      - traefik.http.routers.kshield-front.tls=true
      - traefik.http.routers.kshield-front.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.kshield-front.priority=1
      - traefik.http.routers.kshield-front.service=kshield-front-svc
      - traefik.http.services.kshield-front-svc.loadbalancer.server.port=80
    logging: *logging_rotated

  # ===========================================================================
  # WebSockets / Channels (ASGI) — uvicorn
  # ===========================================================================
  shieldws:
    <<: *django-base
    container_name: kshield_ws
    hostname: shieldws
    command: >
      uvicorn kshield.asgi:application
      --host 0.0.0.0 --port 8001
      --proxy-headers
      --forwarded-allow-ips=*
      --workers 2
      --log-level info
    depends_on:
      shielddb:
        condition: service_healthy
      shieldredis:
        condition: service_healthy
    networks: [kshield_network, proxy]
    # Healthcheck via /healthz (endpoint public exempt de SSL redirect) — évite
    # les logs "GET / 301 Moved Permanently" toutes les 30s. Fallback sur nc
    # au cas où gunicorn n'a pas fini de démarrer.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8001/healthz || nc -z 127.0.0.1 8001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.docker.network=${PROXY_NETWORK:-dokploy-network}

      # Même origine pour le front React : wss://<BASE_DOMAIN>/ws/...
      - traefik.http.routers.kshield-ws-main.rule=Host(`${BASE_DOMAIN:-kaydanshield.com}`) && PathPrefix(`/ws/`)
      - traefik.http.routers.kshield-ws-main.priority=200
      - traefik.http.routers.kshield-ws-main.entrypoints=websecure
      - traefik.http.routers.kshield-ws-main.tls=true
      - traefik.http.routers.kshield-ws-main.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.kshield-ws-main.service=kshield-ws-svc

      # Domaine dédié optionnel : wss://ws.<BASE_DOMAIN>/ws/...
      - traefik.http.routers.kshield-ws.rule=Host(`ws.${BASE_DOMAIN:-kaydanshield.com}`)
      - traefik.http.routers.kshield-ws.entrypoints=websecure
      - traefik.http.routers.kshield-ws.tls=true
      - traefik.http.routers.kshield-ws.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.kshield-ws.service=kshield-ws-svc

      - traefik.http.services.kshield-ws-svc.loadbalancer.server.port=8001
      - traefik.http.services.kshield-ws-svc.loadbalancer.server.scheme=http
      - traefik.http.services.kshield-ws-svc.loadbalancer.sticky.cookie=true
      - traefik.http.services.kshield-ws-svc.loadbalancer.sticky.cookie.name=kshield_ws
      - traefik.http.services.kshield-ws-svc.loadbalancer.sticky.cookie.httpOnly=true
      - traefik.http.services.kshield-ws-svc.loadbalancer.sticky.cookie.secure=true

      # NOTE : middlewares sec-headers/compress retirés — évite le "middleware does
      # not exist" au boot. Django SecurityMiddleware et WhiteNoise couvrent déjà.

  # ===========================================================================
  # Celery worker — non exposé publiquement
  # ===========================================================================
  shieldworker:
    <<: *django-base
    container_name: kshield_worker
    hostname: shieldworker
    command: >
      celery -A kshield worker
      --loglevel=info
      --concurrency=4
      --prefetch-multiplier=1 -Ofair
      --max-tasks-per-child=500
      --without-gossip --without-mingle
    volumes:
      - kshield_media:/app/media:rw
      - kshield_logs:/app/logs:rw
    depends_on:
      shielddb:
        condition: service_healthy
      shieldredis:
        condition: service_healthy
    networks: [kshield_network]
    healthcheck:
      test: ["CMD-SHELL", "celery -A kshield inspect ping -d celery@$$(hostname) >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5

  # ===========================================================================
  # Celery beat (scheduler) — non exposé publiquement
  # ===========================================================================
  shieldbeat:
    <<: *django-base
    container_name: kshield_beat
    hostname: shieldbeat
    command: >
      celery -A kshield beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --pidfile=/tmp/celerybeat.pid
    depends_on:
      shielddb:
        condition: service_healthy
      shieldredis:
        condition: service_healthy
    # Override du HEALTHCHECK Dockerfile (qui teste HTTP :8000) — beat ne
    # sert pas HTTP. On vérifie juste que le processus Celery beat tourne
    # via son PID file.
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [kshield_network]

  # ═══════════════════════════════════════════════════════════════════
  # MQTT bridge (Django) — subscribe topics devices + edge → DB
  # ═══════════════════════════════════════════════════════════════════
  # Ce service tourne un `manage.py mqtt_listen` en foreground.
  # Écoute :
  #   - kshield/<tenant>/rfid/<serial>       → RFID scan events
  #   - kshield/<tenant>/ble/<serial>        → BLE scan events
  #   - kshield/<tenant>/device/<serial>/status → device heartbeat
  #   - kshield/edge/<gateway_id>/events     → batch events depuis agent Go
  #   - kshield/edge/<gateway_id>/status     → heartbeat compact
  #   - kshield/edge/<gateway_id>/scan       → résultat scan réseau
  shieldmqtt_bridge:
    <<: *django-base
    container_name: kshield_mqtt_bridge
    hostname: shieldmqtt_bridge
    command: >
      python manage.py mqtt_listen
      --host shieldmqtt
      --port 1883
      --topic kshield/#
    depends_on:
      shielddb:
        condition: service_healthy
      shieldmqtt:
        condition: service_healthy
    healthcheck:
      # Vérifie juste que le process Python tourne
      test: ["CMD-SHELL", "pgrep -f 'mqtt_listen' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [kshield_network]

  # ===========================================================================
  # Adminer (admin DB) — exposé via Traefik, protégé par basic auth
  # ===========================================================================
  shieldadminer:
    image: adminer:4
    container_name: kshield_adminer
    hostname: shieldadminer
    restart: unless-stopped
    environment:
      TZ: Africa/Abidjan
      ADMINER_DEFAULT_SERVER: shielddb
      ADMINER_DESIGN: dracula
    depends_on:
      shielddb:
        condition: service_healthy
    networks: [kshield_network, proxy]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${PROXY_NETWORK:-dokploy-network}

      - traefik.http.routers.kshield-adminer.rule=Host(`adminer.${BASE_DOMAIN:-kaydanshield.com}`)
      - traefik.http.routers.kshield-adminer.entrypoints=websecure
      - traefik.http.routers.kshield-adminer.tls=true
      - traefik.http.routers.kshield-adminer.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.kshield-adminer.service=kshield-adminer-svc

      - traefik.http.services.kshield-adminer-svc.loadbalancer.server.port=8080
      - traefik.http.services.kshield-adminer-svc.loadbalancer.server.scheme=http

      # Basic Auth obligatoire — générer avec :
      #   htpasswd -nb admin <password>
      # puis renseigner ADMINER_BASIC_AUTH dans .env (échapper les $ en $$)
      - traefik.http.routers.kshield-adminer.middlewares=kshield-adminer-auth
      - traefik.http.middlewares.kshield-adminer-auth.basicauth.users=${ADMINER_BASIC_AUTH:-admin:$$apr1$$change$$me}
    logging: *logging_rotated

  # ===========================================================================
  # Backup automatique — dump quotidien PostgreSQL + rotation 30 jours
  # ===========================================================================
  shieldbackup:
    image: postgres:16-alpine
    container_name: kshield_backup
    hostname: shieldbackup
    restart: unless-stopped
    environment:
      TZ: Africa/Abidjan
      PGHOST: shielddb
      PGUSER: ${POSTGRES_USER:-kshield}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-kaydan_shield}
      # Rétention : nombre de jours à conserver (default 30)
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      # Cron : tous les jours à 02h00 (heure du conteneur)
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
    depends_on:
      shielddb:
        condition: service_healthy
    volumes:
      - kshield_backups:/backups
    networks: [kshield_network]
    # Boucle shell : dump + rotation toutes les 24h via sleep + cron-like.
    # Au démarrage, fait un dump immédiat pour confirmer que ça marche.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "[backup] start — retention=$$BACKUP_RETENTION_DAYS jours"
        mkdir -p /backups
        # Attend que la DB soit prête (jusqu'à 60s)
        i=0
        while ! pg_isready -t 5 >/dev/null 2>&1; do
          i=$$((i+1))
          if [ $$i -gt 12 ]; then
            echo "[backup] ✗ DB injoignable après 60s"
            exit 1
          fi
          sleep 5
        done
        echo "[backup] ✓ DB accessible"

        # Premier dump immédiat (validation)
        if [ ! -f /backups/.first_done ]; then
          STAMP=$$(date +%Y%m%d-%H%M%S)
          F=/backups/kshield-$$STAMP.sql.gz
          echo "[backup] premier dump → $$F"
          if pg_dump --clean --if-exists --no-owner | gzip -9 > $$F.tmp; then
            mv $$F.tmp $$F
            touch /backups/.first_done
            echo "[backup] ✓ taille $$(du -h $$F | cut -f1)"
          else
            rm -f $$F.tmp
            echo "[backup] ✗ premier dump échoué"
          fi
        fi

        # Calcul du délai jusqu'à 02:00 prochaine occurrence — pur shell POSIX
        # (date -v de BSD/macOS et date -d 'tomorrow' de GNU ne sont pas
        # disponibles dans BusyBox/Alpine — on calcule à la main).
        next_delay() {
          H=$$(date +%H)
          M=$$(date +%M)
          S=$$(date +%S)
          # supprime les zéros de tête pour éviter "08" interprété en octal
          H=$$(printf '%d' "$$H")
          M=$$(printf '%d' "$$M")
          S=$$(printf '%d' "$$S")
          if [ "$$H" -lt 2 ]; then
            # Avant 02:00 → cible aujourd'hui 02:00
            echo $$(( (2 - H) * 3600 - M * 60 - S ))
          else
            # Après 02:00 → cible demain 02:00
            echo $$(( (24 - H + 2) * 3600 - M * 60 - S ))
          fi
        }

        while true; do
          DELAY=$$(next_delay)
          if [ "$$DELAY" -le 0 ]; then DELAY=86400; fi
          echo "[backup] prochain dump dans $$DELAY secondes"
          sleep $$DELAY
          STAMP=$$(date +%Y%m%d-%H%M%S)
          F=/backups/kshield-$$STAMP.sql.gz
          echo "[backup] dump → $$F"
          if pg_dump --clean --if-exists --no-owner | gzip -9 > $$F.tmp; then
            mv $$F.tmp $$F
            echo "[backup] ✓ $$F ($$(du -h $$F | cut -f1))"
          else
            rm -f $$F.tmp
            echo "[backup] ✗ dump échoué"
          fi
          # Rotation (BusyBox find supporte -mtime)
          find /backups -name "kshield-*.sql.gz" -type f -mtime +$$BACKUP_RETENTION_DAYS -delete 2>/dev/null || true
          echo "[backup] rotation : conservés $$(ls /backups/kshield-*.sql.gz 2>/dev/null | wc -l) dumps"
        done
    logging: *logging_rotated
