{% load static %}
<!doctype html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion · KAYDAN SHIELD</title>
  <script>
    try { var t = localStorage.getItem("ks-theme");
      if (t) document.documentElement.dataset.theme = t; } catch(e) {}
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0B1B33; --surface:#112742; --surface-strong:#1a3251;
      --border:rgba(255,255,255,.08); --text:#e2e8f0; --text-dim:#94a3b8;
      --ks-orange-400:#F26B1F; --danger:#f87171; --success:#2dd4bf;
    }
    [data-theme="light"] {
      --bg:#f8fafc; --surface:#fff; --surface-strong:#f1f5f9;
      --border:rgba(15,29,52,.08); --text:#0f172a; --text-dim:#64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: Inter, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-shell {
      max-width: 420px; width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .brand {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .brand-mark {
      width: 44px; height: 44px; border-radius: 10px;
      background: linear-gradient(135deg, var(--ks-orange-400), #d946ef);
      display: flex; align-items: center; justify-content: center; color: white;
    }
    .brand h1 {
      margin: 0; font-size: 18px; font-weight: 700;
    }
    .brand .tag { font-size: 11px; color: var(--text-dim); }
    h2 { font-size: 22px; margin: 0 0 8px; font-weight: 700; }
    .sub { font-size: 13px; color: var(--text-dim); margin: 0 0 24px; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; text-transform: uppercase;
      color: var(--text-dim); font-weight: 600; letter-spacing: .04em;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      background: var(--surface-strong); color: var(--text);
      border: 1px solid var(--border); font-size: 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      outline: none; border-color: var(--ks-orange-400);
      box-shadow: 0 0 0 3px rgba(242,107,31,.12);
    }
    .btn-primary {
      width: 100%; padding: 12px; border-radius: 10px; border: 0;
      background: linear-gradient(135deg, var(--ks-orange-400), #d946ef);
      color: #fff; font-weight: 600; font-size: 14px; cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: .94; }
    .error {
      padding: 10px 14px; background: rgba(248,113,113,.12);
      color: var(--danger); border-radius: 8px; font-size: 12.5px;
      border-left: 3px solid var(--danger); margin-bottom: 14px;
    }
    .footer-link {
      text-align: center; margin-top: 18px;
      font-size: 11.5px; color: var(--text-dim);
    }
    .footer-link a { color: var(--ks-orange-400); text-decoration: none; }
  </style>
</head>
<body>
  <main class="login-shell">
    <div class="brand">
      <div class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3 L20 6 V12 C20 17 16.5 20.5 12 22 C7.5 20.5 4 17 4 12 V6 Z"/>
          <path d="M12 3 V22"/>
        </svg>
      </div>
      <div>
        <h1>KAYDAN&nbsp;SHIELD</h1>
        <div class="tag">Contrôle d'accès intelligent</div>
      </div>
    </div>

    <h2>Connexion</h2>
    <p class="sub">Accédez à votre espace administrateur KAYDAN GROUPE.</p>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email"
               value="{{ email|default:'' }}" required autocomplete="email" autofocus>
      </div>
      <div class="field">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary">Se connecter</button>
    </form>

    <div class="footer-link">
      KAYDAN GROUPE © <span id="y"></span> — Solution propriétaire
    </div>
    <script>document.getElementById("y").textContent = new Date().getFullYear();</script>
  </main>
</body>
</html>
