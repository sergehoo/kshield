name: Agent Go — Build & Release

on:
  push:
    # Deux triggers combinés (YAML n'accepte qu'un seul push:).
    branches: [main, develop]
    tags:      ['agent-v*.*.*']
    paths:
      - 'agent-go/**'
      - '.github/workflows/agent-go.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agent-go/**'

jobs:
  # ─── Tests unitaires + go vet + build sanity ────────────────────
  test:
    name: Test + Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: agent-go/go.sum

      - name: Download deps
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -v ./...

      - name: go build (sanity check)
        run: go build -v ./...

  # ─── Cross-compile toutes les plateformes ───────────────────────
  build-release:
    name: Cross-compile release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/agent-v')
    defaults:
      run:
        working-directory: agent-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: agent-go/go.sum

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/agent-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building agent v$VERSION"

      - name: Cross-compile all platforms
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          make release VERSION="$VERSION"
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kshield-agent-${{ steps.version.outputs.version }}
          path: agent-go/dist/
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ steps.version.outputs.version }}
          name: Kaydan Edge Gateway v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            agent-go/dist/kshield-agent-linux-amd64
            agent-go/dist/kshield-agent-linux-arm64
            agent-go/dist/kshield-agent-linux-armv7
            agent-go/dist/kshield-agent-windows-amd64.exe
            agent-go/dist/kshield-agent-darwin-amd64
            agent-go/dist/kshield-agent-darwin-arm64
            agent-go/dist/SHA256SUMS.txt

  # ─── Package .deb (Debian/Ubuntu) ───────────────────────────────
  package-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/agent-v')
    defaults:
      run:
        working-directory: agent-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/agent-v}" >> $GITHUB_OUTPUT

      - name: Install dpkg-deb
        run: sudo apt-get install -y dpkg

      - name: Build .deb
        run: make package-deb VERSION="${{ steps.version.outputs.version }}"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: kshield-edge-deb-${{ steps.version.outputs.version }}
          path: agent-go/dist/*.deb
          retention-days: 90

      - name: Attach .deb to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ steps.version.outputs.version }}
          files: agent-go/dist/*.deb
