name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  build-and-publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # ─── Docker image Django ────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Django image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kshield-back:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/kshield-back:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Front dist (attaché à la release GitHub) ──────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kshield-front/package-lock.json

      - name: Build front
        working-directory: kshield-front
        run: |
          npm ci
          npm run build

      - name: Package front dist
        run: tar -czf kshield-front-${{ steps.version.outputs.version }}.tar.gz -C kshield-front dist

      # ─── Agent Python wheel ────────────────────────────────
      - name: Build agent wheel
        working-directory: agent
        run: |
          pip install build
          python -m build --wheel

      # ─── Release GitHub ────────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kshield-front-${{ steps.version.outputs.version }}.tar.gz
            agent/dist/*.whl
          generate_release_notes: true
