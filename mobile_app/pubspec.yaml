name: kshield_mobile
description: KAYDAN SHIELD — Application mobile (vigiles, visiteurs, agents).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── State management & routing ──────────────────────────────
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # ─── Auth OIDC Keycloak (PKCE) ───────────────────────────────
  # flutter_appauth gère PKCE + refresh tokens en natif (Android + iOS).
  flutter_appauth: ^7.0.0
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1

  # ─── HTTP + offline ──────────────────────────────────────────
  dio: ^5.6.0
  pretty_dio_logger: ^1.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  connectivity_plus: ^6.0.5

  # ─── Scanners QR / NFC / badge IoT ───────────────────────────
  mobile_scanner: ^5.2.0     # QR codes (Android+iOS)
  flutter_nfc_kit: ^3.5.2    # NFC HCE + MIFARE
  image_picker: ^1.1.2       # face capture vigile
  permission_handler: ^11.3.1

  # ─── Notifications push (FCM) ────────────────────────────────
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.1

  # ─── UI / utils ──────────────────────────────────────────────
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
