<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#f97316" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kaydan Shield — Plateforme de sécurité industrielle temps réel : contrôle d'accès, présence, anti-fraude, supervision multi-sites." />
    <meta property="og:title" content="Kaydan Shield" />
    <meta property="og:description" content="Sécurité industrielle temps réel — Kaydan Groupe" />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:type" content="website" />

    <!-- Script anti-flash : applique le thème avant que React ne monte,
         évite le "flash of unstyled content" quand on est en dark mode. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("kshield-theme");
          var mode = "system";
          if (stored) {
            try {
              var parsed = JSON.parse(stored);
              mode = parsed?.state?.mode || parsed?.mode || "system";
            } catch (_) {}
          }
          var isDark =
            mode === "dark" ||
            (mode === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var resolved = isDark ? "dark" : "light";
          document.documentElement.classList.add(resolved);
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          /* silent */
        }
      })();
    </script>

    <meta name="theme-color" content="#f6f8fb" />
    <title>KAYDAN SHIELD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
