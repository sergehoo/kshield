# ──────────────────────────────────────────────────────────────────────────
# KAYDAN SHIELD — Keycloak (auth.datarium-dev.com)
#
# Améliorations vs version originale (sécurité + perf) :
#   ✓ Mode `start --optimized` (build pré-cuit)
#   ✓ Healthchecks DB + Keycloak
#   ✓ DB pinned avec ressources limitées + tuning postgres
#   ✓ Keycloak en read-only filesystem + drop capabilities + no-new-privileges
#   ✓ Variables sensibles via Docker secrets (pas d'admin password en .env)
#   ✓ Log JSON + niveau INFO (audit)
#   ✓ Cache Infinispan local (ispn) — passer en cluster en multi-instance
#   ✓ Theme custom monté en read-only
#   ✓ Réseau interne `sso` isolé du réseau `proxy`
# ──────────────────────────────────────────────────────────────────────────

services:
  keycloak_db:
    image: postgres:16-alpine
    container_name: keycloak_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/keycloak_db_password
      # Tuning perf
      POSTGRES_INITDB_ARGS: "--data-checksums"
    secrets:
      - keycloak_db_password
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=1GB
      -c max_connections=100
      -c log_min_duration_statement=500
      -c log_lock_waits=on
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks: [sso]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    read_only: false   # postgres a besoin d'écrire dans /tmp
    tmpfs:
      - /tmp
      - /var/run/postgresql

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.5
    container_name: keycloak
    restart: unless-stopped
    # `start --optimized` : suppose qu'on a fait `kc.sh build` avant
    # Pour un déploiement simple, garder `start` qui fait build+start.
    command:
      - start
      - --hostname=${KEYCLOAK_DOMAIN}
      - --proxy-headers=xforwarded
      - --http-enabled=true
      - --health-enabled=true
      - --metrics-enabled=true
      - --features=token-exchange,admin-fine-grained-authz,declarative-user-profile
      - --log=console
      - --log-console-output=json
      - --log-level=INFO
    environment:
      # DB
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password
      KC_DB_POOL_INITIAL_SIZE: 5
      KC_DB_POOL_MIN_SIZE: 5
      KC_DB_POOL_MAX_SIZE: 30
      # Bootstrap admin (à virer après 1er run)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
      # Hostname
      KC_HOSTNAME: ${KEYCLOAK_DOMAIN}
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      # Cache (single-node — passer à `ispn` cluster pour HA multi-instance)
      KC_CACHE: "ispn"
      KC_CACHE_STACK: "tcp"
      # Sécurité supplémentaire
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    secrets:
      - keycloak_db_password
      - keycloak_admin_password
    depends_on:
      keycloak_db:
        condition: service_healthy
    volumes:
      # Theme custom KAYDAN — read-only
      - ./keycloak/themes:/opt/keycloak/themes:ro
      # Providers custom (.jar) si besoin (event listener custom, etc.)
      - ./keycloak/providers:/opt/keycloak/providers:ro
    networks: [sso, proxy]
    ports:
      # On expose 9000 pour les metrics Prometheus si besoin (pas en public)
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '2.0'
        reservations:
          memory: 768M
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_DOMAIN}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      # Headers de sécurité
      - "traefik.http.middlewares.keycloak-headers.headers.framedeny=true"
      - "traefik.http.middlewares.keycloak-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.keycloak-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.keycloak-headers.headers.referrerpolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.keycloak-headers.headers.stsseconds=31536000"
      - "traefik.http.middlewares.keycloak-headers.headers.stsincludesubdomains=true"
      - "traefik.http.middlewares.keycloak-headers.headers.stspreload=true"
      - "traefik.http.routers.keycloak.middlewares=keycloak-headers"
      # Rate limiting (anti brute-force réseau, en plus de Keycloak)
      - "traefik.http.middlewares.keycloak-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.keycloak-ratelimit.ratelimit.burst=40"

volumes:
  keycloak_db_data:
    driver: local

networks:
  sso:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.28.10.0/24
  proxy:
    external: true

# ──────────────────────────────────────────────────────────────────────────
# Docker secrets — fichiers à créer côté hôte avec mode 0600 :
#   echo "<strong-random-pw>" | docker secret create keycloak_db_password -
#   echo "<strong-admin-pw>"  | docker secret create keycloak_admin_password -
#
# OU pour docker-compose (sans Swarm) :
#   ./secrets/keycloak_db_password.txt    (chmod 600)
#   ./secrets/keycloak_admin_password.txt (chmod 600)
# ──────────────────────────────────────────────────────────────────────────
secrets:
  keycloak_db_password:
    file: ./secrets/keycloak_db_password.txt
  keycloak_admin_password:
    file: ./secrets/keycloak_admin_password.txt
