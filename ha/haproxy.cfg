global
    log stdout format raw local0
    maxconn 500

defaults
    mode tcp
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    log global

# ─── Stats ───
listen stats
    mode http
    bind *:8404
    stats enable
    stats uri /
    stats refresh 10s

# ─── Leader Postgres (writes) ───
# Probe HTTP sur Patroni REST API :8008 :
#   /master → 200 si le nœud est leader, 503 sinon
listen postgres_leader
    bind *:5000
    option httpchk GET /master
    http-check expect status 200
    default-server inter 3s fall 2 rise 2 on-marked-down shutdown-sessions
    server pg-node1 pg-node1:5432 maxconn 100 check port 8008
    server pg-node2 pg-node2:5432 maxconn 100 check port 8008
    server pg-node3 pg-node3:5432 maxconn 100 check port 8008

# ─── Replicas (reads only) ───
listen postgres_replicas
    bind *:5001
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 2 rise 2
    server pg-node1 pg-node1:5432 maxconn 100 check port 8008
    server pg-node2 pg-node2:5432 maxconn 100 check port 8008
    server pg-node3 pg-node3:5432 maxconn 100 check port 8008
